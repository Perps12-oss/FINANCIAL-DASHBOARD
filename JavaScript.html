<script>
  // ============================================
  // GLOBAL STATE MANAGEMENT
  // ============================================
  const AppState = {
    data: null,
    calendar: null,
    chartInstances: {},
    modalChartInstance: null,
    currentTheme: localStorage.getItem('appTheme') || 'dark',
    filters: { category: null },
    dateRange: { start: null, end: null },
    pendingRequests: new Set(),
    toastQueue: [],
    update(key, value) {
      this[key] = value;
      window.dispatchEvent(new CustomEvent('appstate-change', { detail: { key, value } }));
    }
  };

  function getFilteredTransactions() {
    var txs = AppState.data && Array.isArray(AppState.data.transactions) ? AppState.data.transactions : [];
    var range = AppState.dateRange;
    if (!range || !range.start || !range.end) return txs;
    var start = new Date(range.start);
    var end = new Date(range.end);
    end.setHours(23, 59, 59);
    return txs.filter(function(t) {
      var d = new Date(t.date);
      return d >= start && d <= end;
    });
  }

  function getEffectiveKPIs() {
    var full = AppState.data && Array.isArray(AppState.data.transactions) ? AppState.data.transactions : [];
    var filtered = getFilteredTransactions();
    var balance = full.reduce(function(s, t) { return s + t.amount; }, 0);
    var income = filtered.filter(function(t) { return t.amount > 0; }).reduce(function(s, t) { return s + t.amount; }, 0);
    var expense = Math.abs(filtered.filter(function(t) { return t.amount < 0; }).reduce(function(s, t) { return s + t.amount; }, 0));
    var savingsRate = income > 0 ? ((income - expense) / income) * 100 : 0;
    var serverKpis = AppState.data && AppState.data.kpis ? AppState.data.kpis : {};
    return {
      balance: balance.toFixed(2),
      income: income.toFixed(2),
      expense: expense.toFixed(2),
      savingsRate: savingsRate.toFixed(1),
      daysToPayday: serverKpis.daysToPayday != null ? serverKpis.daysToPayday : 0,
      avgIncome: serverKpis.avgIncome || '0.00',
      avgExpense: serverKpis.avgExpense || '0.00'
    };
  }

  function updateFilteredSummaryUI() {
    var range = AppState.dateRange;
    var summaryEl = document.getElementById('filtered-summary');
    if (!summaryEl) return;
    if (!range || !range.start || !range.end) {
      summaryEl.style.display = 'none';
      return;
    }
    var txs = getFilteredTransactions();
    var income = txs.filter(function(t) { return t.amount > 0; }).reduce(function(s, t) { return s + t.amount; }, 0);
    var expense = txs.filter(function(t) { return t.amount < 0; }).reduce(function(s, t) { return s + Math.abs(t.amount); }, 0);
    var balance = income - expense;
    document.getElementById('filtered-count').innerText = txs.length;
    var balanceEl = document.getElementById('filtered-balance');
    if (balanceEl) { balanceEl.innerText = '£' + balance.toFixed(2); balanceEl.style.color = balance >= 0 ? 'var(--success)' : 'var(--danger)'; }
    var incomeEl = document.getElementById('filtered-income');
    if (incomeEl) incomeEl.innerText = '£' + income.toFixed(2);
    var expenseEl = document.getElementById('filtered-expense');
    if (expenseEl) expenseEl.innerText = '£' + expense.toFixed(2);
    summaryEl.style.display = 'block';
  }

  function refreshDateDrivenViews() {
    if (!AppState.data) return;
    updateKPIs(getEffectiveKPIs());
    renderDashboardCharts();
    if (document.getElementById('calendar')) initializeCalendar();
    updateFilteredSummaryUI();
  }

  // ============================================
  // ERROR BOUNDARY & SAFE EXECUTION
  // ============================================
  async function safeExecute(fn, fallback = null, errorMessage = 'Operation failed') {
    try {
      return await fn();
    } catch (error) {
      console.error(`${errorMessage}:`, error);
      showToast(errorMessage, 'error');
      return fallback;
    }
  }

  // ============================================
  // DEBOUNCE UTILITY
  // ============================================
  function debounce(func, wait) {
    let timeout;
    return function executedFunction(...args) {
      const later = () => {
        clearTimeout(timeout);
        func(...args);
      };
      clearTimeout(timeout);
      timeout = setTimeout(later, wait);
    };
  }

  // ============================================
  // INITIALIZATION (IMPROVED)
  // ============================================
  document.addEventListener('DOMContentLoaded', async function() {
    try {
      initializeTheme();
      await initializeApp();
      initializeEventListeners();
      initializeServiceWorker();
    } catch (error) {
      showError('Failed to initialize application: ' + error.message);
    }
  });

  function initializeTheme() {
    var saved = localStorage.getItem('appTheme') || '';
    var themeClass = saved.indexOf('theme-') === 0 ? saved : ('theme-' + (saved || 'dark'));
    document.body.className = themeClass;
    AppState.currentTheme = themeClass.replace(/^theme-/, '') || 'dark';
  }

  async function initializeApp() {
    showLoader(true);
    await loadDashboardData();
    showLoader(false);
  }

  function initializeEventListeners() {
    // Dropzone with proper drag & drop
    const dropZone = document.getElementById('drop-zone');
    if (dropZone) {
      ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, preventDefaults);
      });
      
      dropZone.addEventListener('drop', handleDrop);
      dropZone.addEventListener('click', () => document.getElementById('csv-file').click());
    }

    // File input with validation
    const fileInput = document.getElementById('csv-file');
    if (fileInput) {
      fileInput.addEventListener('change', handleFileSelect);
    }

    // Window resize handler for charts
    window.addEventListener('resize', debounce(handleResize, 250));
    
    // Keyboard shortcuts
    window.addEventListener('keydown', handleKeyboardShortcuts);
  }

  function preventDefaults(e) {
    e.preventDefault();
    e.stopPropagation();
  }

  function handleResize() {
    if (AppState.calendar) AppState.calendar.updateSize();
    Object.values(AppState.chartInstances).forEach(chart => {
      if (chart && typeof chart.resize === 'function') chart.resize();
    });
  }

  function handleKeyboardShortcuts(e) {
    // Ctrl/Cmd + K to search
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      showQuickSearch();
    }
    // Escape to close modals
    if (e.key === 'Escape') {
      closeAllModals();
    }
  }

  // ============================================
  // TOAST NOTIFICATION SYSTEM (ENHANCED)
  // ============================================
  function showToast(message, type = 'info', duration = 4000) {
    const container = document.getElementById('toast-container');
    if (!container) return;

    const id = `toast-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
    const icon = {
      success: 'check-circle',
      error: 'exclamation-circle',
      warning: 'exclamation-triangle',
      info: 'info-circle'
    }[type] || 'info-circle';

    const toast = document.createElement('div');
    toast.id = id;
    toast.className = `toast ${type}`;
    toast.setAttribute('role', 'alert');
    toast.innerHTML = `
      <i class="fas fa-${icon}"></i>
      <span>${message}</span>
      <button class="toast-close" onclick="this.parentElement.remove()">×</button>
    `;

    container.appendChild(toast);
    
    // Trigger animation
    setTimeout(() => toast.classList.add('show'), 10);
    
    // Auto remove
    const timeoutId = setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 300);
    }, duration);

    // Store timeout for cleanup
    toast.dataset.timeoutId = timeoutId;
    
    // Pause timeout on hover
    toast.addEventListener('mouseenter', () => clearTimeout(timeoutId));
    toast.addEventListener('mouseleave', () => {
      const newTimeout = setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, duration);
      toast.dataset.timeoutId = newTimeout;
    });
  }

  function showError(message) { showToast(message, 'error'); }
  function showSuccess(message) { showToast(message, 'success'); }
  function showWarning(message) { showToast(message, 'warning'); }

  // ============================================
  // LOADER MANAGEMENT
  // ============================================
  function showLoader(show) {
    const loader = document.getElementById('loader');
    if (!loader) return;
    
    if (show) {
      loader.style.display = 'flex';
      loader.setAttribute('aria-label', 'Loading content');
    } else {
      loader.style.display = 'none';
      loader.removeAttribute('aria-label');
    }
  }

  // ============================================
  // DATA LOADING WITH CACHE & RETRY
  // ============================================
  async function loadDashboardData(forceRefresh = false) {
    const cacheKey = 'dashboardData';
    const cacheTime = 5 * 60 * 1000; // 5 minutes

    // Don't use cache if it was empty/error (so KPIs can refresh when data is now available)
    if (!forceRefresh) {
      const cached = sessionStorage.getItem(cacheKey);
      if (cached) {
        try {
          const parsed = JSON.parse(cached);
          const data = parsed.data;
          const timestamp = parsed.timestamp || 0;
          const isEmpty = !data || !Array.isArray(data.transactions) || data.transactions.length === 0 || data._error;
          if (Date.now() - timestamp < cacheTime && !isEmpty) {
            processDashboardData(data);
            return;
          }
        } catch (e) {}
      }
    }

    // Load fresh data with retry (pass forceRefresh so server bypasses its cache when needed)
    let retries = 3;
    while (retries > 0) {
      try {
        const response = await new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)
            .getDashboardData(forceRefresh);
        });
        if (!response || typeof response !== 'object') throw new Error('Invalid response');
        var data = response.data || {};
        if (!Array.isArray(data.transactions)) data.transactions = [];
        if (!data.kpis || typeof data.kpis !== 'object') data.kpis = { balance: '0.00', income: '0.00', expense: '0.00', savingsRate: '0', daysToPayday: 0, avgIncome: '0.00', avgExpense: '0.00' };
        if (!forceRefresh && response.success) sessionStorage.setItem(cacheKey, JSON.stringify({ data: data, timestamp: Date.now() }));
        processDashboardData(data);
        showOrHideNoDataBanner();
        if (data.transactions && data.transactions.length > 0) window._noDataToastShown = false;
        if (!response.success && response.error) showToast(response.error, 'warning', 8000);
        if (response.meta && response.meta.validation && (response.meta.validation.warnings || []).length) {
          response.meta.validation.warnings.forEach(function(w) { showToast(w, 'info', 4000); });
        }
        return;
      } catch (error) {
        retries--;
        if (retries === 0) {
          showError('Failed to load data. Open the spreadsheet once from Google Drive and run Initialize System from the menu, then refresh.');
          processDashboardData({
            transactions: [],
            settings: {},
            budgets: {},
            nw: { assets: [], liabilities: [] },
            goals: [],
            kpis: { balance: '0.00', income: '0.00', expense: '0.00', savingsRate: '0', daysToPayday: 0, avgIncome: '0.00', avgExpense: '0.00' }
          });
          showOrHideNoDataBanner();
        } else {
          await new Promise(r => setTimeout(r, 1000));
        }
      }
    }
    showLoader(false);
  }

  function processDashboardData(data) {
    if (!data) return;
    AppState.update('data', data);
    setDefaultDateRange();
    updateKPIs(getEffectiveKPIs());
    renderDashboardCharts();
    initializeCalendar();
    initializeNetWorth();
    updateFilteredSummaryUI();
    showOrHideNoDataBanner();
  }

  function showOrHideNoDataBanner() {
    var banner = document.getElementById('no-data-banner');
    if (!banner) return;
    var hasData = AppState.data && Array.isArray(AppState.data.transactions) && AppState.data.transactions.length > 0;
    banner.style.display = hasData ? 'none' : 'block';
  }

  function setDefaultDateRange() {
    var startEl = document.getElementById('start-date');
    var endEl = document.getElementById('end-date');
    if (!startEl || !endEl) return;
    if (startEl.value && endEl.value) return;
    var today = new Date();
    var start = new Date(today.getFullYear(), today.getMonth(), 1);
    startEl.value = start.getFullYear() + '-' + String(start.getMonth() + 1).padStart(2, '0') + '-' + String(start.getDate()).padStart(2, '0');
    endEl.value = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
  }

  function updateKPIs(kpis) {
    var kpiElements = {
      balance: 'kpi-balance',
      income: 'kpi-income',
      expense: 'kpi-expense',
      savingsRate: 'kpi-savings'
    };
    if (!kpis) kpis = { balance: '0.00', income: '0.00', expense: '0.00', savingsRate: '0' };
    Object.keys(kpiElements).forEach(function(key) {
      var id = kpiElements[key];
      var el = document.getElementById(id);
      if (!el) return;
      var val = kpis[key];
      if (key === 'savingsRate') {
        el.innerText = (val != null ? val : 0) + '%';
        return;
      }
      var num = parseFloat(val);
      if (isNaN(num)) num = 0;
      el.innerText = '£' + num.toFixed(2);
    });
  }

  // ============================================
  // ENHANCED CALENDAR
  // ============================================
  function initializeCalendar() {
    const calendarEl = document.getElementById('calendar');
    if (!calendarEl || !AppState.data) return;

    // Destroy existing calendar if any
    if (AppState.calendar) {
      AppState.calendar.destroy();
    }

    var rangeTx = getFilteredTransactions();
    const events = rangeTx.map(t => ({
      id: `tx-${t.date}-${t.description}-${Math.random()}`,
      title: `${t.description} (${t.category})`,
      start: t.date,
      end: t.date,
      allDay: true,
      className: t.amount >= 0 ? 'fc-event-income' : 'fc-event-expense',
      extendedProps: { ...t },
      backgroundColor: t.amount >= 0 ? 'var(--success)' : 'var(--danger)',
      borderColor: 'transparent'
    }));

    AppState.calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek,listMonth'
      },
      events: events,
      eventDisplay: 'block',
      dayMaxEvents: 3,
      moreLinkClick: 'day',
      
      dayCellDidMount: (info) => {
        renderSparkline(info.date, info.el);
      },
      
      dateClick: (info) => {
        showDayTransactions(info.dateStr, info.jsEvent);
      },
      
      eventClick: (info) => {
        showTransactionDetails(info.event.extendedProps, info.jsEvent);
      },
      
      eventDidMount: (info) => {
        // Add tooltip
        info.el.setAttribute('title', 
          `${info.event.title}\nAmount: £${Math.abs(info.event.extendedProps.amount).toFixed(2)}`
        );
      },
      
      height: 'auto',
      aspectRatio: 1.8,
      
      // Localization
      locale: 'en',
      firstDay: 1, // Monday
      
      // Loading indicator
      loading: (isLoading) => {
        showLoader(isLoading);
      }
    });

    AppState.calendar.render();
  }

  function renderSparkline(date, cellEl) {
    var rangeTx = getFilteredTransactions();
    if (!rangeTx.length) return;
    const dateStr = date.toISOString().split('T')[0];
    const dayTxs = rangeTx.filter(t => t.date === dateStr);
    if (dayTxs.length === 0) return;

    const totals = dayTxs.reduce((acc, t) => {
      if (t.amount > 0) acc.income += t.amount;
      else acc.expense += Math.abs(t.amount);
      return acc;
    }, { income: 0, expense: 0 });

    const maxValue = Math.max(totals.income, totals.expense, 1);
    const wrap = document.createElement('div');
    wrap.className = 'day-sparkline-wrap';
    wrap.setAttribute('aria-label', `Income: £${totals.income.toFixed(2)}, Expense: £${totals.expense.toFixed(2)}`);

    if (totals.income > 0) {
      const bar = document.createElement('div');
      bar.className = 'spark-bar spark-income';
      bar.style.width = `${(totals.income / maxValue) * 100}%`;
      wrap.appendChild(bar);
    }

    if (totals.expense > 0) {
      const bar = document.createElement('div');
      bar.className = 'spark-bar spark-expense';
      bar.style.width = `${(totals.expense / maxValue) * 100}%`;
      wrap.appendChild(bar);
    }

    const frame = cellEl.querySelector('.fc-daygrid-day-frame');
    if (frame) frame.appendChild(wrap);
  }

  // ============================================
  // TRANSACTION MODALS
  // ============================================
  function showDayTransactions(dateStr, jsEvent) {
    if (!AppState.data) return;
    var rangeTx = getFilteredTransactions();
    const dayTxs = rangeTx.filter(t => t.date === dateStr).sort((a, b) => Math.abs(b.amount) - Math.abs(a.amount));

    if (dayTxs.length === 0) return;

    const modal = document.getElementById('tiny-modal');
    const title = document.getElementById('tiny-modal-title');
    const body = document.getElementById('tiny-modal-body');
    
    title.textContent = `Transactions: ${formatDate(dateStr, 'long')}`;
    body.innerHTML = dayTxs.map(t => createTransactionRow(t)).join('');

    positionModal(modal, jsEvent);
    modal.style.display = 'block';
  }

  function showTransactionDetails(transaction, jsEvent) {
    const modal = document.getElementById('tiny-modal');
    const title = document.getElementById('tiny-modal-title');
    const body = document.getElementById('tiny-modal-body');
    
    title.textContent = formatDate(transaction.date, 'long');
    body.innerHTML = createTransactionDetails(transaction);

    positionModal(modal, jsEvent);
    modal.style.display = 'block';
  }

  function createTransactionRow(t) {
    const isIncome = t.amount >= 0;
    return `
      <div class="tiny-tx-item" onclick="showTransactionDetails(${JSON.stringify(t).replace(/"/g, '&quot;')}, event)">
        <div>
          <div style="font-weight:500;">${escapeHtml(t.description)}</div>
          <div style="color:var(--text-dim); font-size:11px;">${escapeHtml(t.category || 'Uncategorized')}</div>
        </div>
        <div style="font-weight:700; color:${isIncome ? 'var(--success)' : 'var(--danger)'}">
          ${isIncome ? '+' : '-'}£${Math.abs(t.amount).toFixed(2)}
        </div>
      </div>
    `;
  }

  function createTransactionDetails(t) {
    return `
      <div class="transaction-detail">
        <div class="detail-row">
          <span class="detail-label">Description:</span>
          <span class="detail-value">${escapeHtml(t.description)}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Amount:</span>
          <span class="detail-value" style="color:${t.amount >= 0 ? 'var(--success)' : 'var(--danger)'}">
            ${t.amount >= 0 ? '+' : '-'}£${Math.abs(t.amount).toFixed(2)}
          </span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Category:</span>
          <span class="detail-value">${escapeHtml(t.category || 'Uncategorized')}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Date:</span>
          <span class="detail-value">${formatDate(t.date, 'long')}</span>
        </div>
        <div class="detail-actions">
          <button class="btn-outline btn-small" onclick="editTransaction('${t.date}', '${escapeHtml(t.description)}')">
            <i class="fas fa-edit"></i> Edit
          </button>
          <button class="btn-outline btn-small" onclick="categorizeTransaction('${t.date}', '${escapeHtml(t.description)}')">
            <i class="fas fa-tag"></i> Recategorize
          </button>
        </div>
      </div>
    `;
  }

  function positionModal(modal, jsEvent) {
    const x = jsEvent.clientX;
    const y = jsEvent.clientY;
    
    modal.style.display = 'block';
    const rect = modal.getBoundingClientRect();
    
    let left = x;
    let top = y;
    
    if (left + rect.width > window.innerWidth) {
      left = window.innerWidth - rect.width - 20;
    }
    if (top + rect.height > window.innerHeight) {
      top = window.innerHeight - rect.height - 20;
    }
    
    modal.style.left = left + 'px';
    modal.style.top = top + 'px';
    modal.style.transform = 'none';
  }

  function closeTinyModal() {
    document.getElementById('tiny-modal').style.display = 'none';
  }

  // ============================================
  // KPI DETAIL MODAL (ENHANCED)
  // ============================================
  function openKpiDetail(type) {
    console.log('Opening KPI detail:', type);
    
    const modal = document.getElementById('kpi-detail-modal');
    const bodyEl = document.getElementById('kpi-detail-body');
    const titleEl = document.getElementById('detail-title');
    
    if (!modal || !bodyEl || !titleEl) {
      console.error('Modal elements not found');
      return;
    }
    
    if (!AppState.data || !AppState.data.transactions) {
      showError('No data available');
      return;
    }
    var rangeTx = getFilteredTransactions();
    var balanceTx = AppState.data.transactions;
    var rangeLabel = AppState.dateRange && AppState.dateRange.start && AppState.dateRange.end ? ' (selected range)' : '';

    let content = '';
    switch(type) {
      case 'balance':
        titleEl.textContent = 'Balance History';
        content = generateBalanceView(balanceTx);
        break;
      case 'income':
        titleEl.textContent = 'Income' + rangeLabel;
        const incomeTxs = rangeTx.filter(t => t.amount > 0);
        content = generateIncomeView(incomeTxs);
        break;
      case 'expenses':
        titleEl.textContent = 'Expenses' + rangeLabel;
        const expenseTxs = rangeTx.filter(t => t.amount < 0);
        content = generateExpenseView(expenseTxs);
        break;
      case 'savings':
        titleEl.textContent = 'Savings Analysis' + rangeLabel;
        content = generateSavingsView(rangeTx);
        break;
      default:
        titleEl.textContent = 'Details';
        content = '<p>Select a valid KPI</p>';
    }

    bodyEl.innerHTML = content;
    modal.style.display = 'block';
    if (type === 'income' || type === 'expenses') {
      setTimeout(function() {
        var canvas = document.getElementById('modal-chart');
        if (canvas) {
          var data = type === 'income' ? rangeTx.filter(function(t) { return t.amount > 0; }) : rangeTx.filter(function(t) { return t.amount < 0; });
          renderCategoryChart(data);
        }
      }, 100);
    }
  }

  function generateBalanceView(fullTransactions) {
    var txs = fullTransactions || (AppState.data && AppState.data.transactions) || [];
    if (!txs.length) return '<p>No data</p>';
    var sorted = txs.slice().sort(function(a, b) { return new Date(a.date) - new Date(b.date); });
    var running = 0;
    const balancePoints = sorted.map(t => {
      running += t.amount;
      return { date: t.date, balance: running };
    });
    const totalIncome = txs.filter(t => t.amount > 0).reduce((s, t) => s + t.amount, 0);
    const totalExpense = txs.filter(t => t.amount < 0).reduce((s, t) => s + Math.abs(t.amount), 0);
    const currentBalance = running;
    
    const highest = Math.max(...balancePoints.map(p => p.balance));
    const lowest = Math.min(...balancePoints.map(p => p.balance));
    
    return `
      <div class="kpi-detail-stats">
        <div class="stat-card glass">
          <span class="stat-label">Current Balance</span>
          <span class="stat-value" style="color: ${currentBalance >= 0 ? 'var(--success)' : 'var(--danger)'}">
            £${currentBalance.toFixed(2)}
          </span>
        </div>
        <div class="stat-card glass">
          <span class="stat-label">Highest Balance</span>
          <span class="stat-value">£${highest.toFixed(2)}</span>
        </div>
        <div class="stat-card glass">
          <span class="stat-label">Lowest Balance</span>
          <span class="stat-value">£${lowest.toFixed(2)}</span>
        </div>
        <div class="stat-card glass">
          <span class="stat-label">Lifetime Income</span>
          <span class="stat-value" style="color: var(--success)">+£${totalIncome.toFixed(2)}</span>
        </div>
        <div class="stat-card glass">
          <span class="stat-label">Lifetime Expense</span>
          <span class="stat-value" style="color: var(--danger)">-£${totalExpense.toFixed(2)}</span>
        </div>
      </div>
      <div class="chart-wrapper-modal">
        <canvas id="modal-chart"></canvas>
      </div>

    const rate = income > 0 ? (savings / income) * 100 : 0;

    const dailyAvg = expense / daysInMonth;

          </div>

            <div class="stat-row">
              <span>💰 Income</span>
              <span style="color: var(--success); font-weight: 600;">+£${income.toFixed(2)}</span>
            </div>
            <div class="stat-row">
              <span>💸 Expenses</span>
              <span style="color: var(--danger); font-weight: 600;">-£${expense.toFixed(2)}</span>
            </div>
            <div class="stat-row" style="border-top: 1px solid var(--glass-border); padding-top: 10px; margin-top: 5px;">
              <span>📊 Net Savings</span>
              <span style="color: ${savings >= 0 ? 'var(--success)' : 'var(--danger)'}; font-weight: 700;">
                ${savings >= 0 ? '+' : '-'}£${Math.abs(savings).toFixed(2)}
              </span>
            </div>

          <h4 style="color: var(--primary); margin-bottom: 10px;"><i class="fas fa-lightbulb"></i> Insights</h4>
          <ul style="list-style: none; padding-left: 0;">
            ${generateSavingsInsights(rate, savings, income, expense)}
          </ul>
        </div>
        
        <!-- Optional: Add a mini trend chart here if desired, but we omit for brevity -->
      </div>
    `;
  }

  function generateSavingsInsights(rate, savings, income, expense) {
    const insights = [];
    
    if (rate >= 20) {
      insights.push('✅ Excellent savings rate! Consider investing surplus.');
    } else if (rate >= 10) {
      insights.push('👍 Good savings rate. You\'re on track!');
    } else if (rate > 0) {
      insights.push('⚠️ Savings rate could be improved. Try to reduce discretionary spending.');
    } else if (rate === 0) {
      insights.push('⚠️ Breaking even. Look for ways to increase income or reduce expenses.');
    } else {
      insights.push('🔴 Spending exceeds income. Review your expenses immediately.');
    }
    
    if (expense > income * 0.5) {
      insights.push('💡 Your expense-to-income ratio is high. Consider fixed cost reduction.');
    }
    
    if (income === 0) {
      insights.push('⚠️ No income recorded this month. Add income transactions.');
    }
    
    if (insights.length === 0) {
      insights.push('📊 Keep tracking your finances for personalized insights.');
    }
    
    return insights.map(i => `<li style="margin-bottom: 8px;">${i}</li>`).join('');
  }

  function buildSankeyFromTransactions(txs) {
    var MIN = 50;
    var incomeMap = {};
    txs.filter(function(t) { return t.amount > 0; }).forEach(function(t) {
      incomeMap[t.description] = (incomeMap[t.description] || 0) + t.amount;
    });
    var expenseMap = {};
    txs.filter(function(t) { return t.amount < 0; }).forEach(function(t) {
      expenseMap[t.category] = (expenseMap[t.category] || 0) + Math.abs(t.amount);
    });
    var incomeLabels = Object.keys(incomeMap).filter(function(k) { return incomeMap[k] > MIN; });
    var expenseLabels = Object.keys(expenseMap);
    var labels = incomeLabels.concat(['💰 Total Income']).concat(expenseLabels);
    var sources = [], targets = [], values = [];
    var totalIdx = incomeLabels.length;
    incomeLabels.forEach(function(_, i) {
      sources.push(i);
      targets.push(totalIdx);
      values.push(incomeMap[incomeLabels[i]]);
    });
    expenseLabels.forEach(function(_, i) {
      sources.push(totalIdx);
      targets.push(totalIdx + 1 + i);
      values.push(expenseMap[expenseLabels[i]]);
    });
    return { labels: labels, sources: sources, targets: targets, values: values };
  }

  function build3DMatrixFromTransactions(txs) {
    var categorySpend = {};
    txs.filter(function(t) { return t.amount < 0; }).forEach(function(t) {
      categorySpend[t.category] = (categorySpend[t.category] || 0) + Math.abs(t.amount);
    });
    var categories = Object.keys(categorySpend).sort(function(a, b) { return categorySpend[b] - categorySpend[a]; }).slice(0, 8);
    var months = [], monthKeys = [];
    for (var i = 5; i >= 0; i--) {
      var d = new Date();
      d.setMonth(d.getMonth() - i);
      months.push(d.toLocaleString('default', { month: 'short', year: '2-digit' }));
      monthKeys.push(d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0'));
    }
    var z = months.map(function() { return categories.map(function() { return 0; }); });
    txs.forEach(function(t) {
      if (t.amount >= 0) return;
      var key = t.date.substring(0, 7);
      var monthIdx = monthKeys.indexOf(key);
      var catIdx = categories.indexOf(t.category);
      if (monthIdx !== -1 && catIdx !== -1) z[monthIdx][catIdx] += Math.abs(t.amount);
    });
    return { x: categories, y: months, z: z };
  }

      const isOver = percent > 100;

      return `

          .saveFinalBudgets(budgetMap);

  function initializeNetWorth() {
    if (!AppState.data?.nw) return;

    const { assets = [], liabilities = [] } = AppState.data.nw;
    
    document.getElementById('asset-list').innerHTML = '';
    document.getElementById('liab-list').innerHTML = '';

    assets.forEach(a => addAssetRow('assets', a.name, a.value));
    liabilities.forEach(l => addAssetRow('liabilities', l.name, l.value));

    calculateNetWorthTotal();
  }

  function addAssetRow(type, name = '', value = 0) {
    const container = document.getElementById(type === 'assets' ? 'asset-list' : 'liab-list');
    if (!container) return;

    const rowId = `row-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
    const row = document.createElement('div');
    row.className = 'nw-row';
    row.id = rowId;
    row.innerHTML = `
      <input type="text" class="nw-name" placeholder="Name" value="${escapeHtml(name)}">
      <input type="number" class="nw-value" placeholder="Value" value="${value}" step="100" min="0">
      <button class="nw-delete" onclick="removeAssetRow('${rowId}', '${type}')">
        <i class="fas fa-times"></i>
      </button>
    `;

    // Add change listeners
    row.querySelectorAll('input').forEach(input => {
      input.addEventListener('input', debounce(calculateNetWorthTotal, 300));
    });

    container.appendChild(row);
    calculateNetWorthTotal();
  }

  function removeAssetRow(rowId, type) {
    const row = document.getElementById(rowId);
    if (row) {
      row.remove();
      calculateNetWorthTotal();
      showToast('Item removed', 'info');
    }
  }

  function calculateNetWorthTotal() {
    let totalAssets = parseFloat(AppState.data?.kpis?.balance || 0);
    let totalLiabilities = 0;

    document.querySelectorAll('#asset-list .nw-value').forEach(input => {
      totalAssets += parseFloat(input.value) || 0;
    });

    document.querySelectorAll('#liab-list .nw-value').forEach(input => {
      totalLiabilities += parseFloat(input.value) || 0;
    });

    const total = totalAssets - totalLiabilities;
    const element = document.getElementById('nw-total');
    
    if (element) {
      element.textContent = `£${total.toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      })}`;
      element.style.color = total >= 0 ? 'var(--success)' : 'var(--danger)';
    }

    return total;
  }

  async function syncNetWorth() {
    const assets = [];
    const liabilities = [];

    document.querySelectorAll('#asset-list .nw-row').forEach(row => {
      const name = row.querySelector('.nw-name')?.value;
      const value = parseFloat(row.querySelector('.nw-value')?.value) || 0;
      if (name && value > 0) {
        assets.push({ name, value });
      }
    });

    document.querySelectorAll('#liab-list .nw-row').forEach(row => {
      const name = row.querySelector('.nw-name')?.value;
      const value = parseFloat(row.querySelector('.nw-value')?.value) || 0;
      if (name && value > 0) {
        liabilities.push({ name, value });
      }
    });

    await safeExecute(async () => {
      await new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject)
          .saveNetWorth({ assets, liabilities });
      });
      
      showSuccess('Net worth updated successfully!');
    }, null, 'Failed to save net worth');
  }

  // ============================================
  // SETTINGS
  // ============================================
  function toggleExternalInput() {
    const type = document.getElementById('source-type')?.value;
    const container = document.getElementById('external-id-container');
    if (container) {
      container.style.display = type === 'external' ? 'block' : 'none';
    }
  }

  async function verifyConnection() {
    const id = document.getElementById('external-sheet-id')?.value;
    if (!id) {
      showWarning('Please enter a Sheet ID');
      return;
    }

    showLoader(true);
    
    await safeExecute(async () => {
      const result = await new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject)
          .testExternalConnection(id);
      });

      if (result.success) {
        showSuccess(`Connected to: ${result.name}`);
      } else {
        showError(result.message);
      }
    }, null, 'Connection test failed');

    showLoader(false);
  }

  async function saveAllSettings() {
    const sourceType = document.getElementById('source-type')?.value;
    const externalId = document.getElementById('external-sheet-id')?.value;
    const apiKey = document.getElementById('openai-key')?.value;

    showLoader(true);

    // Save data source
    const sourceSaved = await safeExecute(async () => {
      await new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject)
          .updateDataSource(sourceType, externalId);
      });
      return true;
    }, false, 'Failed to save data source');

    // Save API key if provided
    if (apiKey && sourceSaved) {
      await safeExecute(async () => {
        await new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)
            .setUserProp('OPENAI_API_KEY', apiKey);
        });
      }, null, 'Failed to save API key');
    }

    showLoader(false);
    
    if (sourceSaved) {
      showSuccess('Settings saved! Refreshing data...');
      setTimeout(() => loadDashboardData(true), 1500);
    }
  }

  // ============================================
  // IMPORT WIZARD
  // ============================================
  function handleDrop(e) {
    preventDefaults(e);
    const file = e.dataTransfer?.files[0];
    if (file && file.type === 'text/csv') {
      handleFileSelect({ target: { files: [file] } });
    } else {
      showError('Please drop a CSV file');
    }
  }

  function handleFileSelect(event) {
    const file = event.target.files?.[0];
    if (!file) return;

    if (file.type !== 'text/csv' && !file.name.endsWith('.csv')) {
      showError('Please select a CSV file');
      return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
      processCSV(e.target.result);
    };
    reader.onerror = function() {
      showError('Failed to read file');
    };
    reader.readAsText(file);
  }

  var _importCSVData = null;

  function processCSV(csvText) {
    const lines = csvText.split('\n').filter(line => line.trim());
    if (lines.length < 2) {
      showError('CSV must have headers and at least one data row');
      return;
    }

    const headers = lines[0].split(',').map(h => h.trim());
    const data = lines.slice(1).map(line => 
      line.split(',').map(cell => cell.trim())
    );

    _importCSVData = { headers: headers, rows: data };
    showToast(`Loaded ${data.length} rows`, 'success');
    
    document.getElementById('import-step-1').style.display = 'none';
    document.getElementById('import-step-2').style.display = 'block';
    
    generateMappingUI(headers);
  }

  function generateMappingUI(headers) {
    const mappingArea = document.getElementById('mapping-area');
    const requiredFields = ['Date', 'Description', 'Amount', 'Category'];

    mappingArea.innerHTML = requiredFields.map(field => `
      <div class="mapping-row">
        <label>${field}:</label>
        <select class="map-select" data-field="${field.toLowerCase()}">
          <option value="">-- Select Column --</option>
          ${headers.map((h, i) => `<option value="${i}">${h}</option>`).join('')}
        </select>
      </div>
    `).join('');
  }

  async function executeImport() {
    const mapping = {};
    document.querySelectorAll('.map-select').forEach(select => {
      mapping[select.dataset.field] = select.value;
    });

    const requiredFields = ['date', 'description', 'amount', 'category'];
    const missingFields = requiredFields.filter(f => !mapping[f] || mapping[f] === '');

    if (missingFields.length > 0) {
      showError(`Please map all required fields: ${missingFields.join(', ')}`);
      return;
    }

    if (!_importCSVData || !_importCSVData.rows || _importCSVData.rows.length === 0) {
      showError('No import data. Please select a CSV file again.');
      return;
    }

    const dateIdx = parseInt(mapping.date, 10);
    const descIdx = parseInt(mapping.description, 10);
    const amountIdx = parseInt(mapping.amount, 10);
    const categoryIdx = mapping.category !== '' ? parseInt(mapping.category, 10) : -1;

    const dataArray = _importCSVData.rows.map(row => {
      const dateVal = dateIdx >= 0 ? (row[dateIdx] || '').trim() : '';
      const descVal = descIdx >= 0 ? (row[descIdx] || '').trim() : '';
      const amtVal = amountIdx >= 0 ? parseFloat(row[amountIdx]) || 0 : 0;
      const catVal = categoryIdx >= 0 ? (row[categoryIdx] || 'Uncategorized').trim() : 'Uncategorized';
      return { date: dateVal, description: descVal, amount: amtVal, category: catVal };
    }).filter(item => item.date && item.description);

    showLoader(true);

    await safeExecute(async () => {
      const result = await new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject)
          .processImportData(dataArray);
      });

      if (result && result.success) {
        showSuccess(`Import completed: ${result.count || 0} transactions added.`);
        closeImportWizard();
        _importCSVData = null;
        await loadDashboardData(true);
      } else {
        showError(result && result.message ? result.message : 'Import failed');
      }
    }, null, 'Import process failed');

    showLoader(false);
  }

  function resetImport() {
    _importCSVData = null;
    document.getElementById('import-step-1').style.display = 'block';
    document.getElementById('import-step-2').style.display = 'none';
    document.getElementById('csv-file').value = '';
  }

  function openImportWizard() {
    document.getElementById('import-modal').style.display = 'block';
    resetImport();
  }

  function closeImportWizard() {
    document.getElementById('import-modal').style.display = 'none';
  }

  // ============================================
  // THEME MANAGEMENT
  // ============================================
  function setTheme(themeName) {
    const themeClass = themeName ? 'theme-' + themeName : '';
    document.body.className = themeClass || 'theme-dark';
    localStorage.setItem('appTheme', themeClass || 'theme-dark');
    
    // Update active swatch
    document.querySelectorAll('.theme-swatch').forEach(s => 
      s.classList.remove('active')
    );
    if (themeName) {
      document.querySelector(`.theme-swatch[data-theme="${themeName}"]`)
        ?.classList.add('active');
    }

    // Refresh charts with new theme
    if (AppState.data) {
      renderDashboardCharts();
    }

    showToast(`Theme changed to ${themeName || 'Default'}`, 'info');
  }

  function toggleFab(btn) {
    btn.classList.toggle('active');
    const menu = btn.previousElementSibling;
    if (menu) menu.classList.toggle('show');
  }

  // ============================================
  // LABS: diagnostics, health check, logs
  // ============================================
  function scriptRunWithTimeout(fnName, timeoutMs) {
    timeoutMs = timeoutMs || 30000;
    return new Promise(function(resolve, reject) {
      var resolved = false;
      var t = setTimeout(function() {
        if (resolved) return;
        resolved = true;
        reject(new Error('Request timed out after ' + (timeoutMs / 1000) + 's'));
      }, timeoutMs);
      google.script.run
        .withSuccessHandler(function(result) {
          if (resolved) return;
          resolved = true;
          clearTimeout(t);
          resolve(result);
        })
        .withFailureHandler(function(err) {
          if (resolved) return;
          resolved = true;
          clearTimeout(t);
          reject(err);
        })[fnName].apply(google.script.run, Array.prototype.slice.call(arguments, 2));
    });
  }
  function runHealthCheckFromLabs() {
    var el = document.getElementById('labs-connection');
    if (el) el.innerHTML = 'Running health check...';
    google.script.run
      .withSuccessHandler(function(r) {
        var el = document.getElementById('labs-connection');
        if (!el) return;
        el.innerHTML = 'Health check: ' + (r.success ? 'OK' : 'FAILED') + (r.message ? ' – ' + r.message : '') + (r.rowCount !== undefined ? ' (rows: ' + r.rowCount + ')' : '');
        el.style.color = r.success ? 'var(--success)' : 'var(--danger)';
      })
      .withFailureHandler(function(err) {
        var el = document.getElementById('labs-connection');
        if (el) { el.innerHTML = 'Health check error: ' + (err && err.message ? err.message : err); el.style.color = 'var(--danger)'; }
      })
      .checkDataConnection();
  }
  function runTestFromLabs() {
    showToast('Running testGetDashboardData...', 'info');
    google.script.run
      .withSuccessHandler(function(r) {
        showToast(r.success ? 'Test passed. Check Apps Script logs.' : 'Test failed: ' + (r.error || ''), r.success ? 'success' : 'error');
      })
      .withFailureHandler(function(err) { showToast('Test error: ' + (err && err.message ? err.message : err), 'error'); })
      .testGetDashboardData();
  }
  function refreshLabsLogs() {
    google.script.run
      .withSuccessHandler(function(r) {
        var pre = document.getElementById('labs-log-entries');
        if (!pre) return;
        if (!r.success || !r.entries || !r.entries.length) { pre.textContent = r.error || 'No log entries.'; return; }
        pre.textContent = r.entries.slice().reverse().map(function(e) {
          return (e.t || '') + ' [' + (e.level || '') + '] ' + (e.source || '') + ': ' + (e.message || '') + (e.detail ? ' | ' + e.detail : '');
        }).join('\n');
      })
      .withFailureHandler(function() {
        var pre = document.getElementById('labs-log-entries');
        if (pre) pre.textContent = 'Failed to load logs.';
      })
      .getSystemLogEntries();
  }
  function runLabsDiagnostics() {
    google.script.run
      .withSuccessHandler(function(d) {
        var el = document.getElementById('labs-connection');
        if (!el) return;
        var s = 'Connection: ' + (d.connection && d.connection.success ? 'OK' : 'FAIL') + (d.connection && d.connection.message ? ' – ' + d.connection.message : '');
        if (d.lastError) s += '\nLast error: ' + (d.lastError.message || '') + ' @ ' + (d.lastError.source || '');
        if (d.cacheAgeMs != null) s += '\nCache age: ' + Math.round(d.cacheAgeMs / 1000) + 's';
        el.innerHTML = s.replace(/\n/g, '<br>');
        el.style.color = (d.connection && d.connection.success) ? 'var(--success)' : 'var(--danger)';
      })
      .withFailureHandler(function(err) {
        var el = document.getElementById('labs-connection');
        if (el) { el.innerHTML = 'Diagnostics error: ' + (err && err.message ? err.message : err); el.style.color = 'var(--danger)'; }
      })
      .getDiagnostics();
  }
  window.runHealthCheckFromLabs = runHealthCheckFromLabs;
  window.runTestFromLabs = runTestFromLabs;
  window.refreshLabsLogs = refreshLabsLogs;

  // ============================================
  // PAGE NAVIGATION
  // ============================================
  function showPage(pageId) {
    // Hide all pages
    document.querySelectorAll('#page-content > div[id$="-view"]').forEach(div => {
      div.style.display = 'none';
    });

    // Show selected page
    const target = document.getElementById(pageId + '-view');
    if (target) {
      target.style.display = 'block';
      
      // Page-specific handlers
      switch(pageId) {
        case 'dashboard':
          setTimeout(() => {
            Object.keys(AppState.chartInstances).forEach(id => {
              Plotly.relayout(id, {});
            });
          }, 100);
          break;
          
        case 'calendar':
          if (AppState.calendar) {
            setTimeout(() => AppState.calendar.updateSize(), 100);
          } else {
            initializeCalendar();
          }
          break;
          
        case 'budgets':
          loadSmartSuggestions();
          break;
          
        case 'networth':
          calculateNetWorthTotal();
          break;
        case 'labs':
          refreshLabsLogs();
          if (document.getElementById('labs-diagnostics-toggle') && document.getElementById('labs-diagnostics-toggle').checked) runLabsDiagnostics();
          break;
      }
    }

    // Update active nav item
    document.querySelectorAll('.nav-item').forEach(item => {
      item.classList.remove('active');
    });
    document.querySelector(`.nav-item[onclick*="${pageId}"]`)?.classList.add('active');
  }

  // ============================================
  // MODAL MANAGEMENT
  // ============================================
  function closeModal(modalId) {
    const modal = document.getElementById(modalId);
    if (modal) {
      modal.style.display = 'none';
      
      // Clean up chart instance if modal has one
      if (modalId === 'kpi-detail-modal' && AppState.modalChartInstance) {
        AppState.modalChartInstance.destroy();
        AppState.modalChartInstance = null;
      }
    }
  }

  function closeAllModals() {
    const modals = ['tiny-modal', 'kpi-detail-modal', 'import-modal', 'error-modal'];
    modals.forEach(id => closeModal(id));
  }

  // ============================================
  // UTILITY FUNCTIONS
  // ============================================
  function formatDate(dateStr, format = 'short') {
    if (!dateStr) return '';
    try {
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr;
      
      if (format === 'short') {
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      }
      return d.toLocaleDateString('en-US', { 
        weekday: 'short',
        year: 'numeric', 
        month: 'short', 
        day: 'numeric' 
      });
    } catch (e) {
      return dateStr;
    }
  }

  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function showQuickSearch() {
    // Implement quick search functionality
    showToast('Quick search coming soon!', 'info');
  }

  function showError(message) {
    const modal = document.getElementById('error-modal');
    const text = document.getElementById('error-text');
    if (text) text.textContent = message;
    if (modal) modal.style.display = 'block';
    console.error('Error:', message);
  }

  function closeErrorModal() {
    document.getElementById('error-modal').style.display = 'none';
  }

  // ============================================
  // SERVICE WORKER (Optional PWA support)
  // ============================================
  function initializeServiceWorker() {
    if ('serviceWorker' in navigator && location.protocol === 'https:') {
      navigator.serviceWorker.register('/sw.js').catch(err => {
        console.log('ServiceWorker registration failed:', err);
      });
    }
  }

// DATE RANGE FILTER (Integrated with AppState)

(function() {
  window.setQuickRange = function(range) {
    const startEl = document.getElementById('start-date');
    const endEl = document.getElementById('end-date');
    if (!startEl || !endEl) return;
    const today = new Date();
    let startDate = new Date();
    switch(range) {
      case 'month':
        startDate = new Date(today.getFullYear(), today.getMonth(), 1);
        break;
      case 'quarter':
        startDate = new Date(today);
        startDate.setMonth(today.getMonth() - 3);
        break;
      case 'year':
        startDate = new Date(today.getFullYear(), 0, 1);
        break;
      case 'all':
        startDate = new Date(2000, 0, 1);
        break;
    }
    startEl.value = formatDateForInput(startDate);
    endEl.value = formatDateForInput(today);
    applyDateFilter();
  };

  window.formatDateForInput = function(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  };

  window.applyDateFilter = function() {
    if (!AppState.data || !Array.isArray(AppState.data.transactions) || AppState.data.transactions.length === 0) {
      if (!window._noDataToastShown) {
        window._noDataToastShown = true;
        showToast('Load data first: open the spreadsheet, run Initialize System, then click Sync from source.', 'warning', 6000);
      }
      return;
    }
    var startEl = document.getElementById('start-date');
    var endEl = document.getElementById('end-date');
    if (!startEl || !endEl) {
      showToast('Date filter UI not available', 'warning');
      return;
    }
    var startDate = startEl.value;
    var endDate = endEl.value;
    if (!startDate || !endDate) {
      showToast('Please select both start and end dates', 'warning');
      return;
    }
    AppState.dateRange = { start: startDate, end: endDate };
    refreshDateDrivenViews();
    var count = getFilteredTransactions().length;
    showToast('Showing ' + count + ' transactions in range', 'success');
  };

  window.clearFilter = function() {
    AppState.dateRange = { start: null, end: null };
    var summaryEl = document.getElementById('filtered-summary');
    var startEl = document.getElementById('start-date');
    var endEl = document.getElementById('end-date');
    if (summaryEl) summaryEl.style.display = 'none';
    if (startEl) startEl.value = '';
    if (endEl) endEl.value = '';
    refreshDateDrivenViews();
    showToast('Showing all data', 'info');
  };
})();
// ============================================
// SYNC BUTTON FUNCTIONALITY (Integrated)
// ============================================
(function() {
  // Initialize last sync time from localStorage
  let lastSyncTime = localStorage.getItem('lastSyncTime') || null;
  
  // Function to update the sync button state and last sync display
  function updateSyncUI(isSyncing = false) {
    const syncBtn = document.getElementById('sync-button');
    const syncIcon = document.getElementById('sync-icon');
    const lastSyncEl = document.getElementById('last-sync-time');
    if (!syncBtn) return;
    
    if (isSyncing) {
      syncBtn.disabled = true;
      syncBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Syncing...';
      if (syncIcon) syncIcon.className = 'fas fa-spinner fa-spin';
    } else {
      syncBtn.disabled = false;
      syncBtn.innerHTML = '<i class="fas fa-sync-alt"></i> Sync Now';
      if (syncIcon) syncIcon.className = 'fas fa-sync-alt';
    }
    
    if (lastSyncEl && lastSyncTime) {
      lastSyncEl.innerText = `Last sync: ${lastSyncTime}`;
    }
  }
  
  // Manual sync function
  window.manualSync = async function() {
    const syncBtn = document.getElementById('sync-button');
    if (!syncBtn) return;
    
    // Prevent multiple syncs
    if (syncBtn.disabled) return;
    
    updateSyncUI(true);
    showLoader(true);
    
    try {
      // Force refresh: bypass both client and server caches
      await new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject)
          .getDashboardData(true);
      }).then(function(response) {
        var data = (response && response.data) ? response.data : response;
        if (!data) return;
        AppState.update('data', data);
        updateKPIs(data.kpis);
        renderDashboardCharts();
        initializeCalendar();
        initializeNetWorth();
        lastSyncTime = new Date().toLocaleString();
        localStorage.setItem('lastSyncTime', lastSyncTime);
        if (document.getElementById('budgets-view') && document.getElementById('budgets-view').style.display === 'block') loadSmartSuggestions();
        showToast(response.success !== false ? 'Dashboard synced successfully!' : (response.error || 'Synced with warnings'), response.success !== false ? 'success' : 'warning');
      });
    } catch (error) {
      showError('Sync failed: ' + error.message);
    } finally {
      showLoader(false);
      updateSyncUI(false);
    }
  };
  
  // Initialize last sync display on page load
  function initSyncDisplay() {
    const lastSyncEl = document.getElementById('last-sync-time');
    if (lastSyncEl && lastSyncTime) {
      lastSyncEl.innerText = `Last sync: ${lastSyncTime}`;
    }
  }
  
  // Hook into existing DOMContentLoaded (safe to add another listener)
  document.addEventListener('DOMContentLoaded', initSyncDisplay);
})();
