<script>
  /* ─── A. APP SHELL: state, theme, restore, bootstrap ─── */
  const AppState = {
    route: 'dashboard',
    range: '30d',
    fromIso: '',
    toIso: '',
    theme: localStorage.getItem('classicTheme') || 'sacred',
    bundle: null,
    chartPack: null,
    transactions: { items: [], total: 0, categories: [], page: 1, pageSize: 25, filters: { search: '', category: 'All', min: '', max: '' } },
    budgets: [],
    budgetChart: null,
    goals: [],
    insights: '',
    settings: {},
    sourceInfo: {},
    diagnostics: null,
    healthReport: null,
    logs: [],
    accounts: [],
    calendar: {
      view: 'month',
      anchorDate: new Date().toISOString().slice(0, 10),
      data: null,
      activeDate: null,
      activeDayData: null
    },
    buildInfo: {
      version: 'webapp-hardening-v1',
      loadedAt: new Date().toISOString()
    },
    showLabs: false,
    systemLoadError: null
  };

  const PageMeta = {
    dashboard: ['Dashboard', 'Unified overview, KPI strip, and the high-value charts.'],
    transactions: ['Transactions', 'Server-backed pagination and fast filtering.'],
    analytics: ['Analytics', 'Playful chart pack adapted to the single-source backend.'],
    budget: ['Budget', 'Budget actuals, editing, and smart suggestions.'],
    goals: ['Goals', 'Track progress targets without leaving the dashboard.'],
    calendar: ['Calendar', 'Month/week cards with server-backed notes and drill-down.'],
    categories: ['Categories', 'Category leaderboard and share of spend.'],
    merchants: ['Merchants', 'Merchant ranking and concentration analysis.'],
    insights: ['Insights', 'Recurring signals, quick actions, and AI summaries.'],
    forecast: ['Forecast', 'Projection view plus net-worth style account editing.'],
    settings: ['Settings', 'Theme and source configuration for the rebuilt Classic app.'],
    system: ['System', 'Health, diagnostics, and recent logs.'],
    labs: ['Labs', 'Import, cache controls, and backend diagnostics.']
  };

  const ThemeOptions = [
    { id: 'sacred', label: 'Sacred Blue', cls: 'theme-sacred', preview: 'theme-sacred-preview' },
    { id: 'midnight', label: 'Midnight', cls: 'theme-midnight', preview: 'theme-midnight-preview' },
    { id: 'emerald', label: 'Emerald', cls: 'theme-emerald', preview: 'theme-emerald-preview' },
    { id: 'ember', label: 'Ember', cls: 'theme-ember', preview: 'theme-ember-preview' }
  ];

  document.addEventListener('DOMContentLoaded', async () => {
    restoreUiState();
    applyTheme(AppState.theme);
    bindGlobalUI();
    Router.init();
    await DataLoader.bootstrap();
  });

  /* ─── C. API CLIENT: single entry for server calls; envelope-aware wrapper optional ─── */
  function serverCall(functionName, ...args) {
    return new Promise((resolve, reject) => {
      if (typeof google === 'undefined' || !google.script || !google.script.run) {
        reject(new Error('Dashboard must be opened from the Financial Dashboard web app link.'));
        return;
      }
      const runner = google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(err => reject(new Error(err && err.message ? err.message : String(err))));
      runner[functionName](...args);
    });
  }
  /** Like serverCall but unwraps { ok, data, error } envelope: returns data on success, throws on !ok. */
  function api(functionName, ...args) {
    return serverCall(functionName, ...args).then(function(res) {
      if (res && res.ok === false) {
        var msg = (res.error && res.error.message) || (res.error && res.error.code) || 'Request failed';
        throw new Error(msg);
      }
      return res && res.data !== undefined ? res.data : res;
    });
  }

  /* ─── F. UI UTILITIES: loader, toasts, formatters, modals ─── */
  function showLoader(show) {
    const el = document.getElementById('loader');
    if (!el) return;
    el.classList.toggle('hidden', !show);
  }

  function showToast(message, type = 'info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
  }

  function formatCurrency(value) {
    const amount = Number(value) || 0;
    return new Intl.NumberFormat('en-GB', { style: 'currency', currency: 'GBP' }).format(amount);
  }

  function formatSigned(value) {
    const amount = Number(value) || 0;
    return `${amount >= 0 ? '+' : '-'}${formatCurrency(Math.abs(amount))}`;
  }

  function formatPct(value) {
    const amount = Number(value) || 0;
    return `${amount.toFixed(1)}%`;
  }

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function debounce(fn, wait) {
    let timeout;
    return (...args) => {
      clearTimeout(timeout);
      timeout = setTimeout(() => fn(...args), wait);
    };
  }

  function currentRangeOpts() {
    return {
      range: AppState.range,
      fromIso: AppState.range === 'custom' ? AppState.fromIso || null : null,
      toIso: AppState.range === 'custom' ? AppState.toIso || null : null
    };
  }

  function setPageMeta(route) {
    const meta = PageMeta[route] || PageMeta.dashboard;
    var titleEl = document.getElementById('page-title');
    var subtitleEl = document.getElementById('page-subtitle');
    if (titleEl) titleEl.textContent = meta[0];
    if (subtitleEl) subtitleEl.textContent = meta[1];
  }

  function saveUiState() {
    try {
      localStorage.setItem('classicRoute', AppState.route || 'dashboard');
      localStorage.setItem('classicRange', AppState.range || '30d');
      localStorage.setItem('classicFromIso', AppState.fromIso || '');
      localStorage.setItem('classicToIso', AppState.toIso || '');
    } catch (e) {}
  }

  function restoreUiState() {
    try {
      AppState.route = localStorage.getItem('classicRoute') || AppState.route;
      AppState.range = localStorage.getItem('classicRange') || AppState.range;
      AppState.fromIso = localStorage.getItem('classicFromIso') || '';
      AppState.toIso = localStorage.getItem('classicToIso') || '';
      var params = new URLSearchParams(window.location.search);
      AppState.showLabs = params.get('labs') === '1' || localStorage.getItem('classicShowLabs') === '1';
      var rangeEl = document.getElementById('range-select');
      if (rangeEl) rangeEl.value = AppState.range;
      var fromEl = document.getElementById('custom-from');
      var toEl = document.getElementById('custom-to');
      if (fromEl && AppState.fromIso) fromEl.value = AppState.fromIso;
      if (toEl && AppState.toIso) toEl.value = AppState.toIso;
      if (AppState.route && AppState.route !== 'dashboard') window.location.hash = AppState.route;
      updateLabsNavVisibility();
    } catch (e) {}
  }

  function updateLabsNavVisibility() {
    var el = document.getElementById('nav-labs');
    if (el) el.classList.toggle('hidden', !AppState.showLabs);
  }

  function applyTheme(themeId) {
    const theme = ThemeOptions.find(item => item.id === themeId) || ThemeOptions[0];
    document.body.className = theme.cls;
    AppState.theme = theme.id;
    localStorage.setItem('classicTheme', theme.id);
    renderThemes();
  }

  function bindGlobalUI() {
    var rangeSelect = document.getElementById('range-select');
    if (rangeSelect) rangeSelect.addEventListener('change', handleRangeChange);
    var applyRangeBtn = document.getElementById('apply-range-btn');
    if (applyRangeBtn) applyRangeBtn.addEventListener('click', () => DataLoader.reloadRangeData(true));
    var syncBtn = document.getElementById('sync-btn');
    if (syncBtn) syncBtn.addEventListener('click', async () => {
      try {
        showLoader(true);
        const result = await serverCall('syncFromSourceSheet');
        showToast(result.status === 'ok' ? `Synced ${result.rowsSynced || 0} rows.` : (result.message || 'Sync failed'), result.status === 'ok' ? 'success' : 'error');
        await DataLoader.reloadAll();
      } catch (error) {
        showToast(error.message, 'error');
      } finally {
        showLoader(false);
      }
    });
    var exportBtn = document.getElementById('export-btn');
    if (exportBtn) exportBtn.addEventListener('click', ExportModule.exportCsv);
    var switchSacred = document.getElementById('switch-to-sacred');
    if (switchSacred) {
      switchSacred.addEventListener('click', function(e) {
        e.preventDefault();
        var base = window.location.origin + window.location.pathname;
        window.top.location.href = base + (base.indexOf('?') === -1 ? '?' : '&') + 'view=sacred';
      });
    }
    var commandBtn = document.getElementById('command-btn');
    if (commandBtn) commandBtn.addEventListener('click', CommandPalette.open);
    document.querySelectorAll('[data-route-jump]').forEach(button => {
      button.addEventListener('click', () => Router.go(button.dataset.routeJump));
    });
    document.querySelectorAll('[data-close]').forEach(button => {
      button.addEventListener('click', () => document.getElementById(button.dataset.close).classList.add('hidden'));
    });
    document.addEventListener('keydown', event => {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'k') {
        event.preventDefault();
        CommandPalette.open();
      }
      if (event.key === 'Escape') {
        document.getElementById('calendar-modal').classList.add('hidden');
        document.getElementById('command-palette').classList.add('hidden');
      }
    });
    window.addEventListener('resize', debounce(() => {
      if (typeof Plotly === 'undefined') return;
      document.querySelectorAll('.chart-box').forEach(node => {
        if (node) try { Plotly.Plots.resize(node); } catch (e) {}
      });
    }, 150));
    TransactionsModule.bind();
    BudgetModule.bind();
    GoalsModule.bind();
    CalendarModule.bind();
    SettingsModule.bind();
    SystemModule.bind();
    LabsModule.bind();
    ForecastModule.bind();
    CommandPalette.bind();
  }

  function handleRangeChange() {
    AppState.range = document.getElementById('range-select').value;
    const isCustom = AppState.range === 'custom';
    document.getElementById('custom-from').classList.toggle('hidden', !isCustom);
    document.getElementById('custom-to').classList.toggle('hidden', !isCustom);
    document.getElementById('apply-range-btn').classList.toggle('hidden', !isCustom);
    if (!isCustom) {
      DataLoader.reloadRangeData(true);
    } else {
      AppState.fromIso = document.getElementById('custom-from').value || '';
      AppState.toIso = document.getElementById('custom-to').value || '';
    }
    saveUiState();
  }

  /* ─── B. ROUTER: hash-based pages, nav, persistence ─── */
  const Router = {
    init() {
      document.querySelectorAll('.nav-link').forEach(button => {
        button.addEventListener('click', () => this.go(button.dataset.route));
      });
      window.addEventListener('hashchange', () => this.render());
      this.render();
    },
    go(route) {
      window.location.hash = route;
      saveUiState();
    },
    render() {
      const route = (window.location.hash || '#dashboard').replace('#', '');
      AppState.route = PageMeta[route] ? route : 'dashboard';
      document.querySelectorAll('.page').forEach(page => page.classList.toggle('active', page.dataset.page === AppState.route));
      document.querySelectorAll('.nav-link').forEach(link => link.classList.toggle('active', link.dataset.route === AppState.route));
      setPageMeta(AppState.route);
      ChartRenderer.renderForRoute(AppState.route);
      saveUiState();
    }
  };

  /* ─── D. STATE + LOADING: DataLoader populates AppState ─── */
  const DataLoader = {
    async bootstrap() {
      showLoader(true);
      try {
        await this.reloadAll();
      } catch (error) {
        showFatalError(error.message || 'Failed to initialize dashboard.');
      } finally {
        showLoader(false);
      }
    },

    async reloadAll() {
      await Promise.all([
        this.reloadRangeData(false),
        GoalsModule.load(),
        SettingsModule.load(),
        SystemModule.load(),
        ForecastModule.load()
      ]);
    },

    async reloadRangeData(showLoading = false) {
      if (showLoading) showLoader(true);
      try {
        if (AppState.range === 'custom') {
          AppState.fromIso = document.getElementById('custom-from').value || AppState.fromIso;
          AppState.toIso = document.getElementById('custom-to').value || AppState.toIso;
          if (!AppState.fromIso || !AppState.toIso) {
            showToast('Choose both custom dates first.', 'error');
            return;
          }
        }
        const opts = currentRangeOpts();
        const [bootstrap, txData, budgets, insights, calendarData] = await Promise.all([
          serverCall('apiGetAppBootstrap', opts),
          serverCall('apiGetTransactionsPage', { ...opts, offset: 0, limit: AppState.transactions.pageSize }),
          serverCall('getBudgetsData', opts),
          serverCall('getAiFinancialInsights'),
          serverCall('getCalendarData', { view: AppState.calendar.view, anchorDate: AppState.calendar.anchorDate })
        ]);
        if (!bootstrap.ok) throw new Error((bootstrap.error && bootstrap.error.message) || 'Failed to load app bootstrap');
        AppState.bundle = bootstrap.data.dashboard;
        AppState.chartPack = bootstrap.data.charts || {};
        AppState.transactions.page = 1;
        AppState.transactions.items = (txData.data && txData.data.transactions) || [];
        AppState.transactions.total = (txData.data && txData.data.total) || 0;
        AppState.transactions.categories = (txData.data && txData.data.categories) || [];
        AppState.budgets = (budgets.data && budgets.data.budgets) || [];
        AppState.budgetChart = (budgets.data && budgets.data.chart) || { categories: [], actual: [] };
        AppState.insights = insights.data ? insights.data.text : '';
        AppState.calendar.data = calendarData.data || null;
        clearFatalError();
        renderRangeBoundViews();
      } finally {
        if (showLoading) showLoader(false);
      }
    }
  };

  function showFatalError(message) {
    var box = document.getElementById('fatal-error');
    var text = document.getElementById('fatal-error-message');
    if (!box || !text) return;
    text.textContent = message || 'Unknown error';
    box.classList.remove('hidden');
  }

  function clearFatalError() {
    var box = document.getElementById('fatal-error');
    if (box) box.classList.add('hidden');
  }

  /* ─── E. RENDERERS: per-page / per-widget render ─── */
  function renderRangeBoundViews() {
    renderKpis();
    renderBanner();
    renderDashboardSummary();
    TransactionsModule.render();
    BudgetModule.render();
    CalendarModule.render();
    InsightsModule.render();
    renderCategoryPage();
    renderMerchantPage();
    ChartRenderer.renderForRoute(AppState.route);
  }

  function renderKpis() {
    const kpis = (AppState.bundle && AppState.bundle.kpis) || {};
    document.getElementById('kpi-balance').textContent = formatCurrency(kpis.currentBalance);
    document.getElementById('kpi-income').textContent = formatCurrency(kpis.totalIncome);
    document.getElementById('kpi-expenses').textContent = formatCurrency(kpis.totalExpenses);
    document.getElementById('kpi-savings').textContent = formatPct(kpis.savingsRate);
    document.getElementById('kpi-burn').textContent = formatCurrency(kpis.burnRate);
    document.getElementById('kpi-zero').textContent = kpis.projectedDaysToZero == null ? 'Stable' : `${kpis.projectedDaysToZero}d`;
    document.getElementById('kpi-payday').textContent = kpis.daysUntilPayday == null ? '-' : `${kpis.daysUntilPayday}d`;
  }

  function renderBanner() {
    const banner = document.getElementById('validation-banner');
    const meta = AppState.bundle && AppState.bundle.meta;
    const warnings = [];
    if (meta && meta.validation && Array.isArray(meta.validation.errors)) warnings.push(...meta.validation.errors);
    if (meta && meta.validation && Array.isArray(meta.validation.warnings)) warnings.push(...meta.validation.warnings);
    if (!warnings.length && meta && meta.totalRows) {
      banner.classList.add('hidden');
      banner.textContent = '';
      return;
    }
    if (!meta || !meta.totalRows) warnings.push('No transactions were returned for the selected source.');
    banner.innerHTML = warnings.map(item => `<div>${escapeHtml(item)}</div>`).join('');
    banner.classList.remove('hidden');
  }

  function renderDashboardSummary() {
    const bundle = AppState.bundle || { lists: {}, health: {}, meta: {}, kpis: {} };
    const health = bundle.health || {};
    document.getElementById('health-grade').textContent = health.grade || 'No data';
    document.getElementById('health-message').textContent = health.message || 'Add more data to improve the signal quality.';
    document.getElementById('health-total-rows').textContent = `${bundle.meta.totalRows || 0} rows`;
    document.getElementById('health-range').textContent = bundle.meta.range || AppState.range;
    const signalRows = [
      { title: 'Net cash flow', value: formatSigned(bundle.kpis.netCashFlow), tone: bundle.kpis.netCashFlow >= 0 ? 'text-income' : 'text-expense' },
      { title: 'Top category', value: bundle.lists.topCategories && bundle.lists.topCategories[0] ? `${bundle.lists.topCategories[0].name} · ${formatCurrency(bundle.lists.topCategories[0].amount)}` : 'No category data', tone: '' },
      { title: 'Top merchant', value: bundle.lists.topMerchants && bundle.lists.topMerchants[0] ? `${bundle.lists.topMerchants[0].name} · ${formatCurrency(bundle.lists.topMerchants[0].amount)}` : 'No merchant data', tone: '' }
    ];
    document.getElementById('smart-signals').innerHTML = signalRows.map(row => `
      <div class="signal-card">
        <strong>${escapeHtml(row.title)}</strong>
        <div class="${row.tone || ''}">${escapeHtml(row.value)}</div>
      </div>
    `).join('');
    renderRecentList();
    renderRecurringList();
  }

  function renderRecentList() {
    const list = (AppState.bundle && AppState.bundle.lists && AppState.bundle.lists.recentTransactions) || [];
    const target = document.getElementById('recent-transactions');
    target.innerHTML = list.slice(0, 8).map(tx => `
      <div class="list-item">
        <div>
          <strong>${escapeHtml(tx.description || tx.name)}</strong>
          <div class="muted">${escapeHtml(tx.date)} · ${escapeHtml(tx.category)}</div>
        </div>
        <div class="${tx.type === 'income' ? 'text-income' : 'text-expense'}">${formatSigned(tx.amount)}</div>
      </div>
    `).join('') || '<div class="signal-card">No recent transactions.</div>';
  }

  function renderRecurringList() {
    const list = (AppState.bundle && AppState.bundle.lists && AppState.bundle.lists.recurringCandidates) || [];
    const target = document.getElementById('recurring-candidates');
    target.innerHTML = list.slice(0, 8).map(item => `
      <div class="list-item">
        <div>
          <strong>${escapeHtml(item.description || item.name || 'Recurring pattern')}</strong>
          <div class="muted">${escapeHtml(item.category || 'Recurring')}</div>
        </div>
        <div>${formatCurrency(item.avgAmount || item.amount || 0)}</div>
      </div>
    `).join('') || '<div class="signal-card">No recurring candidates found in this range.</div>';
  }

  function renderCategoryPage() {
    const list = (AppState.bundle && AppState.bundle.lists && AppState.bundle.lists.topCategories) || [];
    document.getElementById('category-leaderboard').innerHTML = list.map((item, index) => `
      <div class="leaderboard-item">
        <div>
          <strong>${index + 1}. ${escapeHtml(item.name)}</strong>
          <div class="muted">${formatCurrency(item.amount)}</div>
        </div>
        <div>${formatPct(((item.amount || 0) / Math.max(1, AppState.bundle.kpis.totalExpenses || 1)) * 100)}</div>
      </div>
    `).join('') || '<div class="signal-card">No category spend for this period.</div>';
  }

  function renderMerchantPage() {
    const list = (AppState.bundle && AppState.bundle.lists && AppState.bundle.lists.topMerchants) || [];
    document.getElementById('merchant-leaderboard').innerHTML = list.map((item, index) => `
      <div class="leaderboard-item">
        <div>
          <strong>${index + 1}. ${escapeHtml(item.name)}</strong>
          <div class="muted">${item.transactions || 0} transactions</div>
        </div>
        <div>${formatCurrency(item.amount)}</div>
      </div>
    `).join('') || '<div class="signal-card">No merchant data for this period.</div>';
  }

  const ChartRenderer = {
    renderForRoute(route) {
      if (!AppState.chartPack || !AppState.bundle) return;
      if (route === 'dashboard') this.renderDashboard();
      if (route === 'analytics') this.renderAnalytics();
      if (route === 'categories') this.renderCategories();
      if (route === 'merchants') this.renderMerchants();
      if (route === 'budget') BudgetModule.renderChart();
      if (route === 'forecast') ForecastModule.renderChart();
    },

    baseLayout(title) {
      return {
        title: title || '',
        paper_bgcolor: 'rgba(0,0,0,0)',
        plot_bgcolor: 'rgba(0,0,0,0)',
        font: { color: '#d9e5ff' },
        margin: { l: 48, r: 18, t: 22, b: 42 }
      };
    },

    renderDashboard() {
      const pack = AppState.chartPack || {};
      const run = pack.runningBalance || [];
      const donut = pack.categoryDonut || [];
      const incExp = pack.incomeVsExpense || [];
      const monthly = pack.monthlyNet || [];
      this.react('chart-running-balance', [{
        x: run.map(row => row.date),
        y: run.map(row => row.balance),
        type: 'scatter',
        mode: 'lines',
        fill: 'tozeroy',
        line: { color: '#79a8ff', width: 3 }
      }], this.baseLayout(''));

      this.react('chart-category-donut', [{
        labels: donut.map(row => row.category),
        values: donut.map(row => row.amount),
        type: 'pie',
        hole: 0.58,
        marker: { colors: ['#79a8ff', '#4dd2ff', '#36d399', '#fbbf24', '#fb7185', '#c084fc', '#f472b6', '#818cf8'] }
      }], this.baseLayout(''));

      this.react('chart-income-expense', [
        { x: incExp.map(row => row.month), y: incExp.map(row => row.income), type: 'scatter', mode: 'lines+markers', name: 'Income', line: { color: '#36d399', width: 3 } },
        { x: incExp.map(row => row.month), y: incExp.map(row => row.expenses), type: 'scatter', mode: 'lines+markers', name: 'Expenses', line: { color: '#fb7185', width: 3 } }
      ], this.baseLayout(''));

      this.react('chart-monthly-net', [{
        x: monthly.map(row => row.month),
        y: monthly.map(row => row.net),
        type: 'bar',
        marker: { color: monthly.map(row => row.net >= 0 ? '#36d399' : '#fb7185') }
      }], this.baseLayout(''));
    },

    renderAnalytics() {
      const pack = AppState.chartPack || {};
      const scatter = pack.scatter || [];
      const hist = pack.histogram || [];
      const wday = pack.weekdayHeatmap || {};
      const catMonth = pack.categoryMonthHeatmap || {};
      const waterfall = pack.monthlyWaterfall || [];
      const surf = pack.surface3D || {};
      const forecast = pack.forecast || {};
      const trends = pack.categoryTrends || {};
      const adv = pack.advancedTrend || [];
      const sankey = pack.sankey || {};
      this.react('chart-scatter', [{
        x: scatter.map(row => row.date),
        y: scatter.map(row => row.amount),
        mode: 'markers',
        type: 'scatter',
        marker: { color: scatter.map(row => row.amount >= 0 ? '#36d399' : '#fb7185'), size: 9, opacity: 0.8 }
      }], this.baseLayout(''));

      this.react('chart-histogram', [{
        x: hist,
        type: 'histogram',
        marker: { color: '#79a8ff' }
      }], this.baseLayout(''));

      this.react('chart-weekday-heatmap', [{
        x: wday.x || [],
        y: wday.y || [],
        z: wday.z || [],
        type: 'heatmap',
        colorscale: 'Blues'
      }], this.baseLayout(''));

      this.react('chart-category-heatmap', [{
        x: catMonth.x || [],
        y: catMonth.y || [],
        z: catMonth.z || [],
        type: 'heatmap',
        colorscale: 'YlOrRd'
      }], this.baseLayout(''));

      this.react('chart-waterfall', [{
        x: waterfall.map(row => row.month),
        y: waterfall.map(row => row.net),
        type: 'waterfall',
        connector: { line: { color: '#4dd2ff' } },
        increasing: { marker: { color: '#36d399' } },
        decreasing: { marker: { color: '#fb7185' } }
      }], this.baseLayout(''));

      this.react('chart-surface-3d', [{
        x: surf.x || [],
        y: surf.y || [],
        z: surf.z || [],
        type: 'surface',
        colorscale: 'Viridis'
      }], { ...this.baseLayout(''), scene: { bgcolor: 'rgba(0,0,0,0)' } });

      this.react('chart-forecast-main', [

        const existing = AppState.budgets.find(item => item.category === suggestion.category);

        if (!existing) AppState.budgets.push({ category: suggestion.category, amount: suggestion.suggestedMonthly, period: 'monthly' });

    async shift(direction) {
      const base = new Date(AppState.calendar.anchorDate);
      if (AppState.calendar.view === 'week') base.setDate(base.getDate() + (7 * direction));
      else base.setMonth(base.getMonth() + direction);
      AppState.calendar.anchorDate = base.toISOString().slice(0, 10);
      await this.load();

      });
    },

    renderChart() {
      const forecast = AppState.chartPack && AppState.chartPack.forecast;
      if (!forecast) return;
      const node = document.getElementById('forecast-chart');
      if (!node) return;
      Plotly.react(node, [{
        x: forecast.labels,
        y: forecast.balance,
        type: 'scatter',
        mode: 'lines+markers',
        line: { color: '#79a8ff', width: 3 }
      }], ChartRenderer.baseLayout(''), { displayModeBar: false, responsive: true });
    },

    async save() {
      const payload = {
        assets: AppState.accounts.filter(item => Number(item.balance) >= 0).map(item => ({ name: item.name || 'Asset', value: Number(item.balance) || 0 })),
        liabilities: AppState.accounts.filter(item => Number(item.balance) < 0).map(item => ({ name: item.name || 'Liability', value: Math.abs(Number(item.balance) || 0) }))
      };
      const result = await serverCall('saveNetWorth', payload);
      showToast(result.status === 'success' ? 'Accounts saved.' : (result.message || 'Save failed'), result.status === 'success' ? 'success' : 'error');
    }
  };

  const LabsModule = {
    bind() {
      document.getElementById('labs-test-btn').addEventListener('click', () => this.runTest());
      document.getElementById('labs-clear-cache-btn').addEventListener('click', () => this.clearCaches());
      document.getElementById('labs-reload-btn').addEventListener('click', () => DataLoader.reloadAll());
      document.getElementById('import-btn').addEventListener('click', () => this.importCsv());
    },

    async runTest() {
      const result = await serverCall('testGetDashboardData');
      document.getElementById('labs-results').innerHTML = `
        <div class="signal-card">
          <strong>testGetDashboardData</strong>
          <div class="muted">${escapeHtml(result.success ? 'Success' : (result.error || 'Failed'))}</div>
        </div>
      `;
    },

    async clearCaches() {
      const result = await serverCall('labsClearCaches');
      showToast(result.status === 'success' ? 'Caches cleared.' : (result.message || 'Failed to clear caches'), result.status === 'success' ? 'success' : 'error');
    },

    async importCsv() {
      const input = document.getElementById('import-file');
      const file = input.files && input.files[0];
      if (!file) return showToast('Choose a CSV file first.', 'error');
      const text = await file.text();
      const rows = parseCsv(text);
      if (!rows.length) return showToast('No importable rows were found.', 'error');
      showLoader(true);
      try {
        const result = await serverCall('processImportData', rows);
        if (!result || result.success === false) throw new Error(result && result.message ? result.message : 'Import failed');
        showToast(`Imported ${result.count || 0} rows.`, 'success');
        await DataLoader.reloadAll();
      } catch (error) {
        showToast(error.message, 'error');
      } finally {
        showLoader(false);
      }
    }
  };

  const ExportModule = {
    async exportCsv() {
      const result = await serverCall('exportData', currentRangeOpts());
      if (!result.success) return showToast(result.error || 'Export failed.', 'error');
      const blob = new Blob([result.data.content], { type: 'text/csv;charset=utf-8' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = result.data.filename || 'export.csv';
      document.body.appendChild(link);
      link.click();
      link.remove();
      showToast(`Exported ${result.data.rowCount || 0} rows.`, 'success');
    }
  };

  const CommandPalette = {
    bind() {
      document.getElementById('command-search').addEventListener('input', () => this.render());
    },

    open() {
      document.getElementById('command-palette').classList.remove('hidden');
      document.getElementById('command-search').value = '';
      CommandPalette.render();
      document.getElementById('command-search').focus();
    },

    items() {
      return [
        ...Object.keys(PageMeta).map(route => ({
          label: `Go to ${PageMeta[route][0]}`,
          detail: PageMeta[route][1],
          run: () => Router.go(route)
        })),
        { label: 'Sync from source', detail: 'Refresh backend data and reload the Classic app.', run: () => document.getElementById('sync-btn').click() },
        { label: 'Export current range', detail: 'Download CSV for the selected range.', run: () => document.getElementById('export-btn').click() },
        { label: 'Reload diagnostics', detail: 'Refresh health, diagnostics, and logs.', run: () => SystemModule.load() }
      ];
    },

    render() {
      const term = document.getElementById('command-search').value.trim().toLowerCase();
      const target = document.getElementById('command-results');
      const items = this.items().filter(item => !term || item.label.toLowerCase().includes(term) || item.detail.toLowerCase().includes(term));
      target.innerHTML = items.map((item, index) => `
        <button class="command-item" data-command-index="${index}">
          <strong>${escapeHtml(item.label)}</strong>
          <div class="muted">${escapeHtml(item.detail)}</div>
        </button>
      `).join('') || '<div class="signal-card">No matching command.</div>';
      target.querySelectorAll('[data-command-index]').forEach((button, index) => {
        button.addEventListener('click', () => {
          items[index].run();
          document.getElementById('command-palette').classList.add('hidden');
        });
      });
    }
  };

  function parseCsv(text) {
    const rows = text.split(/\r?\n/).filter(Boolean);
    if (rows.length < 2) return [];
    const headers = parseCsvLine(rows[0]).map(h => h.trim().toLowerCase());
    const dateIndex = headers.indexOf('date');
    const descriptionIndex = headers.indexOf('description');
    const amountIndex = headers.indexOf('amount');
    const categoryIndex = headers.indexOf('category');
    if (dateIndex < 0 || descriptionIndex < 0 || amountIndex < 0) return [];
    return rows.slice(1).map(parseCsvLine).filter(cols => cols.length >= 3).map(cols => ({
      date: cols[dateIndex],
      description: cols[descriptionIndex],
      amount: cols[amountIndex],
      category: categoryIndex >= 0 ? cols[categoryIndex] : 'Uncategorized'
    })).filter(row => row.date && row.description && row.amount !== '');
  }

  function parseCsvLine(line) {
    const values = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i += 1) {
      const char = line[i];
      const next = line[i + 1];
      if (char === '"' && inQuotes && next === '"') {
        current += '"';
        i += 1;
      } else if (char === '"') {
        inQuotes = !inQuotes;
      } else if (char === ',' && !inQuotes) {
        values.push(current);
        current = '';
      } else {
        current += char;
      }
    }
    values.push(current);
    return values.map(value => value.trim());
  }
</script>
