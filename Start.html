<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Financial Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" crossorigin="anonymous">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0d1117 100%);
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; color: #fff; }
    .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 32px; }
    .open-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(0, 210, 255, 0.2);
      border: 1px solid rgba(0, 210, 255, 0.5);
      border-radius: 12px;
      padding: 16px 28px;
      color: #00d2ff;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .open-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 210, 255, 0.2);
    }
    .footer { margin-top: 28px; font-size: 12px; color: #6b7280; }
    .footer a { color: #94a3b8; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Financial Dashboard</h1>
  <p class="subtitle">Sheet-backed overview, budgets, and insights</p>
  <a href="?" id="open-dashboard" class="open-btn">
    <i class="fas fa-chart-line"></i> Open Dashboard
  </a>
  <p class="footer">
    <a href="?view=sacred" id="link-enhanced">Use enhanced layout</a>
  </p>
  <script>
    (function() {
      function isSheetDialog() {
        try {
          return typeof google !== 'undefined' && google.script && google.script.host && typeof google.script.host.close === 'function';
        } catch (e) { return false; }
      }
      function goDashboard(enhanced) {
        if (isSheetDialog()) {
          if (enhanced) {
            google.script.run.withSuccessHandler(function() { google.script.host.close(); }).showSacredDashboard();
          } else {
            google.script.run.withSuccessHandler(function() { google.script.host.close(); }).showDashboard();
          }
          return;
        }
        var base = window.location.origin + window.location.pathname;
        var url = enhanced ? base + (base.indexOf('?') === -1 ? '?' : '&') + 'view=sacred' : base + (base.split('?')[0] || '');
        try { window.location.href = url; } catch (e) { window.top.location.href = url; }
      }
      document.addEventListener('DOMContentLoaded', function() {
        var btn = document.getElementById('open-dashboard');
        var link = document.getElementById('link-enhanced');
        if (btn) btn.addEventListener('click', function(e) { e.preventDefault(); goDashboard(false); });
        if (link) link.addEventListener('click', function(e) { e.preventDefault(); goDashboard(true); });
      });
    })();
  </script>
</body>
</html>
