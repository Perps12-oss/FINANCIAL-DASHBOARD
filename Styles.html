<style>
  /* ==========================================
     THEME ENGINE (10 Corny/Modern Themes)
     ========================================== */
  :root {
    /* Default: Aurora */
    --glass-bg: rgba(255, 255, 255, 0.08);
    --glass-border: rgba(255, 255, 255, 0.15);
    --glass-blur: 20px;
    --primary: #00d2ff;
    --primary-dark: #0099cc;
    --success: #00ff88;
    --danger: #ff4d4d;
    --warning: #ffaa00;
    --text: #ffffff;
    --text-dim: rgba(255, 255, 255, 0.7);
    --bg-start: #020024;
    --bg-mid: #090979;
    --bg-end: #00d4ff;
    --glow-color: rgba(0, 210, 255, 0.5);
  }

  /* Theme Definitions */
  body.theme-neon { --bg-start: #0f0c29; --bg-mid: #302b63; --bg-end: #24243e; --primary: #ff00ff; --success: #00ffff; --danger: #ff0055; --glow-color: rgba(255, 0, 255, 0.5); }
  body.theme-ocean { --bg-start: #141E30; --bg-mid: #243B55; --bg-end: #006994; --primary: #00b4db; --glow-color: rgba(0, 180, 219, 0.5); }
  body.theme-forest { --bg-start: #0f2027; --bg-mid: #203a43; --bg-end: #2c5364; --primary: #74ebd5; --glow-color: rgba(116, 235, 213, 0.5); }
  body.theme-sunset { --bg-start: #352f44; --bg-mid: #5c5470; --bg-end: #fa7a52; --primary: #ffb347; --danger: #ff6961; --glow-color: rgba(255, 179, 71, 0.5); }
  body.theme-mono { --bg-start: #000000; --bg-mid: #434343; --bg-end: #282828; --primary: #ffffff; --text: #e0e0e0; --glass-bg: rgba(255, 255, 255, 0.05); --glow-color: rgba(255, 255, 255, 0.3); }
  body.theme-toxic { --bg-start: #0a2a0a; --bg-mid: #114d11; --bg-end: #1b8a1b; --primary: #39ff14; --danger: #ff14e3; --glass-border: rgba(57, 255, 20, 0.3); --glow-color: rgba(57, 255, 20, 0.5); }
  body.theme-candy { --bg-start: #ff9a9e; --bg-mid: #fecfef; --bg-end: #fad0c4; --primary: #a18cd1; --text: #333333; --glass-bg: rgba(255, 255, 255, 0.4); --glow-color: rgba(161, 140, 209, 0.5); }
  body.theme-gold { --bg-start: #000000; --bg-mid: #1a1a1a; --bg-end: #332a00; --primary: #d4af37; --success: #fdd043; --glass-border: rgba(212, 175, 55, 0.3); --glow-color: rgba(212, 175, 55, 0.5); }
  body.theme-arctic { --bg-start: #E0EAFC; --bg-mid: #CFDEF3; --bg-end: #ffffff; --primary: #00c6ff; --text: #1e3c72; --text-dim: rgba(30, 60, 114, 0.7); --glass-bg: rgba(255, 255, 255, 0.6); --glow-color: rgba(0, 198, 255, 0.5); }
  body.theme-lava { --bg-start: #200122; --bg-mid: #6f0000; --bg-end: #200122; --primary: #fc4a1a; --success: #fab1a0; --glow-color: rgba(252, 74, 26, 0.5); }

  /* Base & Animations */
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Roboto', sans-serif; }
  body { background: linear-gradient(125deg, var(--bg-start), var(--bg-mid), var(--bg-end)); background-size: 400% 400%; animation: aurora 20s ease infinite; color: var(--text); overflow: hidden; height: 100vh; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
  @keyframes aurora { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

  /* Glass Morphism */
  .glass { background: var(--glass-bg); backdrop-filter: blur(var(--glass-blur, 20px)); border: 1px solid var(--glass-border); border-radius: 16px; box-shadow: 0 8px 32px 0 rgba( 31, 38, 135, 0.37 ); }

  /* Layout */
  #app-container { display: flex; height: 100vh; }
  .nav-rail { width: 70px; background: var(--glass-bg); backdrop-filter: blur(20px); border-right: 1px solid var(--glass-border); height: 100vh; transition: width 0.3s ease; overflow: hidden; position: fixed; left: 0; top: 0; z-index: 100; display: flex; flex-direction: column; }
  .nav-rail:hover { width: 220px; }
  .nav-item { padding: 20px 15px; display: flex; align-items: center; gap: 20px; cursor: pointer; white-space: nowrap; transition: all 0.2s ease; color: var(--text-dim); border-left: 3px solid transparent; }
  .nav-item:hover { background: rgba(255, 255, 255, 0.15); color: var(--text); border-left: 3px solid var(--primary); }
  .nav-item.active { background: rgba(255,255,255,0.1); color: var(--primary); }
  .nav-item i { font-size: 24px; min-width: 40px; text-align: center; }
  .nav-item span { opacity: 0; transition: opacity 0.2s ease; }
  .nav-rail:hover .nav-item span { opacity: 1; }
  .content { margin-left: 70px; flex: 1; padding: 20px; overflow-y: auto; height: 100vh; }

  /* KPI Cards (Flamboyant) */
  .kpi-header { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
  .kpi-card { padding: 20px; text-align: center; transition: all 0.3s ease; cursor: pointer; position: relative; overflow: hidden; }
  .kpi-card h3 { font-size: 16px; font-weight: 500; color: var(--text-dim); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .kpi-val { font-size: 32px; font-weight: 700; color: var(--primary); text-shadow: 0 0 20px var(--glow-color); transition: transform 0.2s; }
  .kpi-card:hover { transform: translateY(-5px) scale(1.01); box-shadow: 0 15px 30px rgba(0,0,0,0.3), 0 0 15px var(--glow-color); }
  .kpi-card:active { transform: scale(0.98); }

  /* Dashboard Grid */
  .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
  .full-width { grid-column: span 2; }
  .chart-card { padding: 20px; height: 450px; display: flex; flex-direction: column; }

  /* ==========================================
     ENHANCED CALENDAR (Flamboyant)
     ========================================== */
  .calendar-container { padding: 20px; height: 750px; }
  .fc { color: var(--text); height: 100%; }
  .fc-button { background: var(--glass-bg) !important; border: 1px solid var(--glass-border) !important; color: var(--text) !important; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; transition: all 0.2s; }
  .fc-button:hover { background: var(--primary) !important; color: var(--bg-start) !important; box-shadow: 0 0 15px var(--primary); }
  .fc-button-active { background: linear-gradient(45deg, var(--primary), var(--success)) !important; color: #000 !important; animation: pulse 2s infinite; }
  .fc-theme-standard td, .fc-theme-standard th { border: 1px solid var(--glass-border) !important; }
  .fc-day-today { background: rgba(0, 210, 255, 0.15) !important; box-shadow: inset 0 0 20px rgba(0, 210, 255, 0.2); }
  .fc-daygrid-day-frame { position: relative; min-height: 100px; }
  
  /* SPARKLINES (The colorful bars) */
  .day-sparkline-wrap { position: absolute; bottom: 5px; left: 5px; right: 5px; display: flex; flex-direction: column; gap: 3px; z-index: 0; pointer-events: none; }
  .spark-bar { height: 4px; border-radius: 2px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
  .spark-income { background: linear-gradient(90deg, var(--success), transparent); box-shadow: 0 0 8px var(--success); }
  .spark-expense { background: linear-gradient(90deg, var(--danger), transparent); box-shadow: 0 0 8px var(--danger); }
  
  /* Calendar Events */
  .fc-event { border: none !important; margin: 1px 2px !important; font-size: 10px !important; padding: 2px 4px !important; border-radius: 4px !important; cursor: pointer; backdrop-filter: blur(2px); }
  .fc-event-income { background: linear-gradient(45deg, var(--success), transparent) !important; color: #fff !important; border-left: 2px solid var(--success) !important; }
  .fc-event-expense { background: linear-gradient(45deg, var(--danger), transparent) !important; color: #fff !important; border-left: 2px solid var(--danger) !important; }

  /* Budget Cards (Animated Warning) - Enhanced with inner elements */
  .budget-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin: 20px 0; }
  .budget-card { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .budget-header { display: flex; justify-content: space-between; align-items: center; }
  .budget-category { font-size: 18px; font-weight: 600; }
  .budget-amount { display: flex; align-items: center; gap: 8px; }
  .budget-input { width: 80px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: var(--primary); padding: 6px; border-radius: 6px; text-align: right; font-weight: 600; }
  .progress-container { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
  .progress-bar { height: 100%; transition: width 0.3s ease; }
  .budget-footer { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-dim); }
  .budget-percent { }
  .budget-remaining.over { color: var(--danger); }
  .budget-card.alert-border { border: 1px solid var(--danger); animation: alertPulse 2s infinite; position: relative; overflow: hidden; }
  .budget-card.alert-border::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: repeating-linear-gradient(45deg, var(--danger), var(--danger) 10px, transparent 10px, transparent 20px); animation: moveStripes 1s linear infinite; }
  
  @keyframes moveStripes { from { background-position: 0 0; } to { background-position: 40px 0; } }
  @keyframes alertPulse { 0% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 77, 77, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); } }
  @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

  /* Theme Picker */
  .theme-picker-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-top: 15px; }
  .theme-swatch { height: 50px; border-radius: 12px; cursor: pointer; border: 2px solid transparent; transition: transform 0.2s, box-shadow 0.2s; }
  .theme-swatch:hover { transform: scale(1.1) rotate(2deg); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
  .theme-swatch.active { border-color: white; box-shadow: 0 0 20px rgba(255,255,255,0.5); }

  /* KPI Detail Modal */
  .kpi-detail-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
  .stat-card { padding: 15px; text-align: center; }
  .stat-label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; }
  .stat-value { font-size: 24px; font-weight: 700; color: var(--primary); }
  .chart-wrapper-modal { height: 200px; margin: 20px 0; }
  .detail-list { max-height: 300px; overflow-y: auto; }
  .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .detail-date { width: 80px; font-size: 12px; color: var(--text-dim); }
  .detail-desc { flex: 1; font-size: 13px; }
  .detail-amount { font-weight: 600; width: 90px; text-align: right; }
  
  /* Savings Dashboard */
  .savings-dashboard { display: flex; flex-direction: column; gap: 20px; }
  .savings-ring { position: relative; width: 200px; height: 200px; margin: 0 auto; }
  .savings-ring-bg { stroke: rgba(255,255,255,0.1); }
  .savings-ring-fill { stroke-dasharray: 339.292; transition: stroke-dashoffset 0.5s; }
  .savings-ring-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
  .savings-percent { font-size: 32px; font-weight: 800; color: var(--primary); }
  .savings-label { font-size: 12px; color: var(--text-dim); }
  .savings-stats { display: flex; flex-direction: column; gap: 10px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 12px; }
  .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .stat-row.total { font-weight: 700; border-bottom: none; margin-top: 5px; }
  .savings-tips { padding: 15px; }
  .savings-tips h4 { margin-bottom: 10px; color: var(--primary); }
  .savings-tips ul { list-style: none; padding-left: 0; }
  .savings-tips li { padding: 5px 0; font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .savings-tips li::before { content: '💡'; font-size: 14px; }

  /* Net Worth */
  .nw-row { display: flex; gap: 10px; margin: 10px 0; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 8px; align-items: center; }
  .nw-name { flex: 2; background: none; border: none; border-bottom: 1px solid var(--glass-border); color: var(--text); padding: 5px; }
  .nw-value { flex: 1; background: none; border: none; border-bottom: 1px solid var(--glass-border); color: var(--success); font-weight: 600; padding: 5px; text-align: right; }
  .nw-delete { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 16px; }

  /* Settings */
  .settings-container { max-width: 800px; margin: 0 auto; padding: 30px; }
  .settings-group { margin: 25px 0; }
  .settings-group label { display: block; margin-bottom: 8px; color: var(--text-dim); }
  .settings-group select, .settings-group input { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px; color: var(--text); font-size: 14px; }
  .btn-outline { background: transparent; border: 1px solid var(--primary); padding: 8px 16px; border-radius: 20px; color: var(--primary); font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-outline:hover { background: var(--primary); color: var(--bg-start); }

  /* Tiny Modal */
  .tiny-modal { position: fixed; width: 320px; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px); border: 1px solid var(--primary); border-radius: 12px; padding: 15px; z-index: 2000; box-shadow: 0 15px 50px rgba(0,0,0,0.8); display: none; transform: translate(-50%, -50%); }
  .tiny-modal-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; color: var(--primary); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
  .tiny-modal-close { cursor: pointer; color: var(--danger); transition: transform 0.2s; }
  .tiny-modal-close:hover { transform: rotate(90deg); }
  .tiny-tx-item { display: flex; justify-content: space-between; font-size: 12px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

  /* Utilities */
  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 1000; backdrop-filter: blur(8px); }
  .modal-content { position: relative; max-width: 800px; margin: 50px auto; padding: 30px; max-height: 80vh; overflow-y: auto; }
  .loader-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 2000; }
  .spinner { border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-primary { background: linear-gradient(45deg, var(--primary), var(--primary-dark)); border: none; padding: 12px 25px; border-radius: 25px; color: white; font-weight: 600; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--glow-color); }

  /* Toasts */
  .toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
  .toast { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); color: var(--text); padding: 15px 25px; border-radius: 10px; transform: translateX(120%); transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); display: flex; align-items: center; gap: 12px; font-size: 14px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
  .toast.show { transform: translateX(0); }
  .toast.success { border-left: 4px solid var(--success); background: linear-gradient(80deg, rgba(0, 255, 136, 0.1), transparent); }
  .toast.error { border-left: 4px solid var(--danger); background: linear-gradient(80deg, rgba(255, 77, 77, 0.1), transparent); }

  /* FAB */
  .fab-container { position: fixed; bottom: 30px; right: 90px; display: flex; flex-direction: column-reverse; align-items: center; gap: 15px; z-index: 99; }
  .fab-main { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(45deg, var(--primary), var(--primary-dark)); border: none; color: white; font-size: 24px; cursor: pointer; box-shadow: 0 5px 20px var(--glow-color); transition: transform 0.3s ease; }
  .fab-main.active { transform: rotate(45deg); }
  .fab-options { display: flex; flex-direction: column; gap: 10px; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
  .fab-container:hover .fab-options { opacity: 1; visibility: visible; }
  .fab-option { width: 50px; height: 50px; border-radius: 50%; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text); cursor: pointer; backdrop-filter: blur(10px); transition: all 0.2s; }
  .fab-option:hover { transform: scale(1.2) rotate(10deg); background: var(--primary); color: #000; }
</style>
